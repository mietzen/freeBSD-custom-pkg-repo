{"name":"adguardhome","origin":"mietzen/adguardhome","version":"0.107.56","comment":"Network-wide ads & trackers blocking DNS server","www":"https://adguard.com/en/adguard-home/overview.html","maintainer":"github.nstein@mailbox.org","prefix":"/opt/adguardhome","users":["adguardhome"],"groups":["www"],"licenselogic":"single","licenses":["GPL-3.0 license"],"desc":"AdGuard Home is a network-wide software for blocking ads & tracking.\nAfter you set it up, it'll cover ALL your home devices, and you don't need any client-side software for that.\nIt operates as a DNS server that re-routes tracking domains to a \"black hole,\" thus preventing your devices from connecting to those servers.\nIt's based on software we use for our public AdGuard DNS servers -- both share a lot of common code.\nIMPORTANT:\n- Once it's installed, open http://127.0.0.1:3000/ in your browser to do the initial setup and learn how to configure your devices to use AdGuard Home.\n  You don't need to Launch anything explicitly, AdGuard Home service is already started after the installation.\n- If you're running it on Ubuntu, you may need to select a different \"Listen interface\" for the DNS server.\n  Listening to all interfaces is not possible because Ubuntu's systemd-resolved service uses 127.0.0.1:53 already.\n","scripts":{"post-install":"chown root:wheel /etc/rc.d/adguardhome\necho 'adguardhome_enable=\"YES\"' >> /etc/rc.conf\n"},"arch":"FreeBSD:14:amd64","flatsize":30523850}
{"name":"blocky","origin":"mietzen/blocky","version":0.25,"comment":"Fast and lightweight DNS proxy as ad-blocker for local network with many features","www":"https://0xerr0r.github.io/blocky/","maintainer":"github.nstein@mailbox.org","prefix":"/opt/blocky","users":["blocky"],"groups":["www"],"licenselogic":"single","licenses":["Apache-2.0 license"],"desc":"Blocky is a Go-based DNS proxy and ad-blocker for local networks.\nIt blocks ads, malware, and unwanted domains with customizable allow/deny lists, regex filtering, and deep CNAME inspection.\nIt supports custom DNS resolution, conditional forwarding, and per-client upstream resolvers.\nPerformance features include caching, prefetching, and parallel resolvers. Supports DoH, DoT, and DNSSEC for security.\nProvides Prometheus metrics, REST API, and database logging.\nOpen-source with no telemetry.\n","scripts":{"post-install":"chown root:wheel /etc/rc.d/blocky\necho 'blocky_enable=\"YES\"' >> /etc/rc.conf\n"},"arch":"FreeBSD:14:amd64","flatsize":34720908}
{"name":"btop","origin":"sysutils/btop","version":"1.4.0","comment":"Monitor of resources","maintainer":"pkubaj@FreeBSD.org","www":"https://github.com/aristocratos/btop","abi":"FreeBSD:14:amd64","arch":"freebsd:14:x86:64","prefix":"/usr/local","flatsize":1695748,"licenselogic":"single","licenses":["APACHE20"],"desc":"Resource monitor that shows usage and stats for processor, memory, disks,\nnetwork and processes.\n\nC++ version and continuation of bashtop and bpytop.","categories":["sysutils"],"annotations":{"build_timestamp":"2024-11-01T16:02:45+0000","ports_top_git_hash":"2e2d801cf","ports_top_checkout_unclean":"no","port_git_hash":"19fbadfb9","port_checkout_unclean":"no","built_by":"poudriere-git-3.4.2","FreeBSD_version":"1401000"}}
{"name":"caddy","origin":"mietzen/caddy","version":"2.9.1","comment":"Fast and extensible multi-platform HTTP/1-2-3 web server with automatic HTTPS","www":"https://caddyserver.com/","maintainer":"github.nstein@mailbox.org","prefix":"/opt/caddy","users":["caddy"],"groups":["www"],"licenselogic":"single","licenses":["Apache-2.0 license"],"desc":"Caddy is a platform for running Go applications and serves as a highly extensible HTTPS server.\nApplications are implemented as Caddy modules, with tls and http included by default.\nIt supports automated documentation, live configuration updates via API, and seamless integration with other modules.\nConfiguration is primarily managed through its JSON-based API, but adapters allow the use of formats like Caddyfile, YAML, and NGINX config.\nCaddy consolidates all settings into a single configuration document, simplifying management and reducing complexity.\nIts design enables precise control over in-memory components, such as HTTP handlers and TLS.\nThe plugin system allows extensive customization and improvements beyond other web servers.\nRefer to the documentation for details on configuration structure.\n","scripts":{"post-install":"chown root:wheel /etc/rc.d/caddy\necho 'caddy_enable=\"YES\"' >> /etc/rc.conf\n"},"arch":"FreeBSD:14:amd64","flatsize":41157101}
{"name":"nmap","origin":"security/nmap","version":"7.94_3","comment":"Port scanning utility for large networks","maintainer":"cy@FreeBSD.org","www":"https://nmap.org/","abi":"FreeBSD:14:amd64","arch":"freebsd:14:x86:64","prefix":"/usr/local","flatsize":27234148,"licenselogic":"single","licenses":["NPSL"],"desc":"Nmap is a utility for network exploration and security auditing.\nIt supports various types of host discovery (determine which hosts\nare up), many port scanning techniques for different protocols,\nversion detection (determine service protocols and application\nversions listening behind ports), and TCP/IP stack fingerprinting\n(remote host OS or device identification).  Nmap also offers\nflexible target and port specification, decoy/stealth scanning,\nsunRPC scanning, and much more.\n\nAlso included is Ncat, the nc(1) work-a-like of the Nmap project.\nRefer to the separate port security/zenmap for those parts of the\nNmap toolset which depend on python.  The translated manual pages\nfor Nmap are contained in security/nmap-i18n-man.\n\nSee the web page and the Phrack Magazine article (Volume 7, Issue 51\nSeptember 01, 1997, article 11 of 17) https://nmap.org/p51-11.html","categories":["security"],"options":{"DOCS":"on","NLS":"on","PCAP":"off","SSH2":"on","SSL":"on"},"annotations":{"build_timestamp":"2024-10-31T01:07:01+0000","ports_top_git_hash":"2e2d801cf","ports_top_checkout_unclean":"no","port_git_hash":"19fbadfb9","port_checkout_unclean":"no","built_by":"poudriere-git-3.4.2","cpe":"cpe:2.3:a:nmap:nmap:7.94:::::freebsd14:x64:3","FreeBSD_version":"1401000"}}
{"name":"speedtest-go","origin":"mietzen/speedtest-go","version":"1.7.10","comment":"CLI and Go API to Test Internet Speed using speedtest.net","www":"https://github.com/showwin/speedtest-go","maintainer":"github.nstein@mailbox.org","prefix":"/opt/speedtest-go","licenselogic":"single","licenses":["MIT license"],"desc":"Speedtest-go enables fast, reliable internet speed testing directly from the command line or your Go applications.\nIt supports latency, download, and upload measurements, multi-server testing, and custom configurations.\nWith cross-platform compatibility, JSON output, and proxy support, it's highly extensible and lightweight.\nResults closely match Speedtest.net while being 2x faster.\n","arch":"FreeBSD:14:amd64","flatsize":11603717}
{"name":"traefik","origin":"mietzen/traefik","version":"3.3.2","comment":"The Cloud Native Application Proxy","www":"https://traefik.io","maintainer":"github.nstein@mailbox.org","prefix":"/opt/traefik","users":["traefik"],"groups":["www"],"licenselogic":"single","licenses":["MIT license"],"desc":"Traefik (pronounced traffic) is a modern HTTP reverse proxy and load balancer that makes deploying microservices easy.\nTraefik integrates with your existing infrastructure components:\n  Docker, Swarm mode, Kubernetes, Consul, Etcd, Rancher v2, Amazon ECS\nand configures itself automatically and dynamically.\nPointing Traefik at your orchestrator should be the only configuration step you need.\n","scripts":{"post-install":"chown root:wheel /etc/rc.d/traefik\necho 'traefik_enable=\"YES\"' >> /etc/rc.conf\n"},"arch":"FreeBSD:14:amd64","flatsize":180536174}
{"name":"upsnap","origin":"mietzen/upsnap","version":"4.6.0","comment":"A simple wake on lan web app written with SvelteKit, Go and PocketBase.","www":"https://github.com/seriousm4x/UpSnap","maintainer":"github.nstein@mailbox.org","prefix":"/opt/upsnap","users":["upsnap"],"groups":["www"],"licenselogic":"single","licenses":["MIT license"],"desc":"UpSnap provides an intuitive dashboard to wake devices with one click, schedule timed events, and scan networks for devices.\nBuilt with SvelteKit, Go, and PocketBase, it supports secure user management, multi-language support, and customizable themes.\nIdeal for self-hosting with Docker or binary options, it integrates features like port pinging and network discovery.\nWhile offering powerful functionality, it's recommended to use VPN for external access due to security.\n","dependencies":{"nmap":{"origin":"security/nmap","version":"7.94_3"}},"scripts":{"post-install":"chown root:wheel /etc/rc.d/upsnap\necho 'upsnap_enable=\"YES\"' >> /etc/rc.conf\n"},"arch":"FreeBSD:14:amd64","flatsize":51169825}
{"name":"zsh","origin":"shells/zsh","version":"5.9_4","comment":"The Z shell","maintainer":"bapt@FreeBSD.org","www":"https://www.zsh.org/","abi":"FreeBSD:14:amd64","arch":"freebsd:14:x86:64","prefix":"/usr/local","flatsize":20681006,"licenselogic":"single","licenses":["ZSH"],"desc":"Zsh is the Swiss Army knife of shells. It combines the most popular\nfeatures of every other shell, and then lets you customize every\ninch of it. Users of bourne-style and C-style shells will feel at\nhome in it.\n\nZsh does intelligent completion, spell-checking, has a rich syntax\nfor precise globbing, and is fully extensible through plugin\nsystems.\n\nTo fire up the zsh completion system, type the following commands:\n\n\t$ autoload -U compinstall\n\t$ compinstall","categories":["shells"],"options":{"DEBUG":"off","DOCS":"on","ETCDIR":"off","EXAMPLES":"on","GDBM":"off","PCRE":"off","STATIC":"off"},"annotations":{"build_timestamp":"2024-10-31T01:49:40+0000","ports_top_git_hash":"2e2d801cf","ports_top_checkout_unclean":"no","port_git_hash":"19fbadfb9","port_checkout_unclean":"no","built_by":"poudriere-git-3.4.2","cpe":"cpe:2.3:a:zsh:zsh:5.9:::::freebsd14:x64:4","FreeBSD_version":"1401000"},"messages":[{"message":"==========================================================\n\nBy default, zsh looks for system-wide defaults in\n/usr/local/etc.\n\nIf you previously set up /etc/zprofile, /etc/zshenv, etc.,\neither move them to /usr/local/etc or rebuild zsh with the\nETCDIR option enabled.\n\n==========================================================","type":"install"}]}
